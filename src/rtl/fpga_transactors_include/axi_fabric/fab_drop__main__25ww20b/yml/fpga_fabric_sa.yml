GLOBAL:
#    CHECKS:
#        PATHS_EXIST: YES
    NETBATCH_FILE: $ENV{FPGA_FABRIC_ROOT}/yml/netbatch.yml
    SETUP:
        - GCC_HOME=/usr/intel/pkgs/gcc/9.2.0
        - LD_LIBRARY_PATH=${LD_LIBRARY_PATH}:/p/hdk/rtl/cad/x86-64_linux412/dt/jem/d21ww21a_64/lib  
        - SYNOPSYS=$ENV{SYNOPSYS}
        - PWD=$ENV{PWD}
  

CONFIGURATIONS:
    FPGA_FABRIC_COMMON:
        ABSTRACT: YES
        USER:
            MERGE_LIBRARIES: YES   
        SETUP:
            - FPGA_FABRIC_SA=1
            - FPGA_FABRIC_SA_SIM=1
        ADD_LIBS:
            - fpga_fabric_rtl_lib
        MOD_LIBS_ARRAY:
            - .*:
                DEFINES:
                    ADD: 
                        - FPGA_FABRIC_SA_SIM
                        - FPGA_FABRIC_SA
                        - DEBUG_ASSERTION
            - fpga_fabric_rtl_lib:
                LIBDIRS:
                    ADD:
                        - $ENV{FPGA_FABRIC_ROOT}/source/rtl
                        - $ENV{FPGA_FABRIC_ROOT}/source/rtl/common
                        - $ENV{FPGA_FABRIC_ROOT}/source/rtl/common/mem
                        - $ENV{FPGA_FABRIC_ROOT}/source/rtl/common/fifo
                        - $ENV{FPGA_FABRIC_ROOT}/source/rtl/common/search_key
                LIBEXT:
                    ADD:
                        - .v
                        - .sv
                        - .svh


    FPGA_FABRIC_AXIM:
        ABSTRACT: YES
        USER:
            MERGE_LIBRARIES: YES   
        INHERITS:
            - FPGA_FABRIC_COMMON
        MOD_LIBS_ARRAY:
            - fpga_fabric_rtl_lib:
                VERILOG_FILES:
                    ADD:
                        - $ENV{FPGA_FABRIC_ROOT}/source/rtl/axim/cbar/axim_fabric_cbar_top.sv
                LIBDIRS:
                    ADD:
                        - $ENV{FPGA_FABRIC_ROOT}/source/rtl/axim
                        - $ENV{FPGA_FABRIC_ROOT}/source/rtl/axim/cbar
                INCDIRS:
                    ADD:
                        - $ENV{FPGA_FABRIC_ROOT}/source/rtl/axim/include


    COCOTB_AXIM:
        INHERITS:
            - FPGA_FABRIC_AXIM
        PLATFORM: VCS
        TOP: fpga_fabric_tb_lib.fpga_fabric_tb_top
        AUTO_GENERATION:
           #DESIGNWARE: NO
            DEBUG: NO   
        USER:
            VCS_SYN_DW_WORKAROUND: YES
            ENABLE_LIBCONFIG: NO
            ENABLE_CONFIG_VERBOSE: NO 
            VCS_ELAB_APPEND:
                - +acc+1
                - +vpi
                - -P pli.tab
                - -sverilog
                - -full64
                - -debug
                - -load cocotb_libs/libcocotbvpi_vcs.so
                - +error+10000 
                - -error=noIPCWM
                - -fgp
                - -kdb 
                - -sva
                - -timescale=1ns/1ns 
                - -gui=verdi
                - -debug_access+all 
                - +notimingcheck 
                - +vcs+lic+wait 
                  #- -assert disable 
                - -assert svaext
                - -assert enable_diag
                - -assert enable_hier
                - -hsopt=gates 
                - -hsopt=cgopt:ncf 
                - -ignore unique_checks
                - +vcs+initreg+random
                - -Xkeyopt=rtopt #umbrella switch that allows runtime optimizations
                - -Xverdi_elab_opts=-saveLevel # copies and replaces all the the needed soft link to the kdb directory
                - +vcs+fsdbon
        USER_SCRIPT:
            setupr_cmd:
                EVENT_NAME: PreRunPlatform
                STAGE_NAME: execute_compile
                FAIL_ON_ERROR: YES
                COMMANDS:
                    - cocotb-config --lib-name-path vpi vcs | xargs dirname | xargs ln -sf ; mv libs cocotb_libs 
                    - echo "acc+=rw,wn:*" > pli.tab
        ADD_LIBS:
            - fpga_fabric_tb_lib
        MOD_LIBS_ARRAY:
            - fpga_fabric_tb_lib:
                VERILOG_FILES:
                    ADD:
                        - $ENV{GEN_ROOT}/fpga_fabric_tb_top.sv
                VERILOG_OPTIONS:
                    ADD: 
                        - +v2k
                        - -lca
                        - -sverilog
                        - -full64
            - .*:
                DEFINES:
                    ADD: 
                        - COCOTB_SIM=1          
                VERILOG_OPTIONS:
                    ADD: 
                        - -Xvd_opts=-ssv,-ssy,-ssz
                        - -kdb
                        - -V



